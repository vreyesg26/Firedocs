name: Build FireDocs (Windows)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  windows:
    name: Windows (exe)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build Windows
        run: npm run dist:win

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: FireDocs-windows
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.zip
            dist/latest*.yml
            dist/*.blockmap